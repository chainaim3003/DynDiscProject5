# ============================================================================
# config/notification-routing.yaml  —  Twilio WhatsApp + UI dashboard
# ============================================================================
#
# This file is the binding between:
#   - the SEMANTIC events agents emit (see src/notify/types.ts AgentEvent)
#   - the PHYSICAL channels and recipient addresses
#
# Phone numbers, tokens, and other secrets are pulled from .env via ${VAR}
# substitution. This file IS safe to commit; .env is NOT.
#
# ACTIVE CHANNELS:
#   - wa-twilio-sandbox   Twilio WhatsApp Sandbox (BSP). Recipients opt in
#                         with `join <code>` to Twilio's sandbox number. The
#                         24h customer-service window applies (Twilio enforces).
#   - ui                  Dashboard via SSE (wraps the existing broadcaster).
#
# To change a recipient's phone number:
#   1. Edit BUYER_PERSONAL_WHATSAPP_E164 (or SELLER_*) in both agent .env files
#   2. Recipient sends `join <code>` to the Twilio sandbox number
#   3. Restart the agents
#
# To upgrade Twilio sandbox → production WhatsApp Sender:
#   1. After Twilio business verification, set fromPhoneE164 to the production
#      number and change `mode: bsp` → `mode: production`
#   2. Drop the sandboxJoinCode line (no opt-in needed in production)
#   3. Restart the agents
#   (No code changes anywhere.)
#
# ============================================================================

channels:
  # ── Twilio WhatsApp Sandbox (BSP) — active demo channel ────────────────────
  - id:   wa-twilio-sandbox
    kind: whatsapp
    impl: whatsapp-twilio
    mode: bsp
    config:
      accountSid:      "${TWILIO_ACCOUNT_SID}"
      authToken:       "${TWILIO_AUTH_TOKEN}"
      fromPhoneE164:   "${TWILIO_SANDBOX_FROM_E164}"
      # Optional hint surfaced in error messages if recipient hasn't joined:
      sandboxJoinCode: "${TWILIO_SANDBOX_JOIN_CODE}"

  # ── Existing dashboard via SSE — wrapped as a channel for audit visibility ─
  - id:   ui
    kind: ui-dashboard
    impl: ui-dashboard
    mode: n/a
    config: {}

recipients:
  - role:            buyer-cpo
    legalEntityName: "TOMMY HILFIGER EUROPE B.V."
    lei:             "54930012QJWZMYHNJW95"
    channels:
      - channelId: ui
        events:
          - negotiation-started
          - own-offer-sent
          - counterparty-offer-received
          - deal-closed
          - escalation
          - treasury-block
      - channelId: wa-twilio-sandbox
        address:
          phoneE164: "${BUYER_PERSONAL_WHATSAPP_E164}"
        events:
          - negotiation-started
          - own-offer-sent
          - counterparty-offer-received
          - deal-closed
          - escalation
          - treasury-block

  - role:            seller-cso
    legalEntityName: "JUPITER KNITTING COMPANY"
    lei:             "3358004DXAMRWRUIYJ05"
    channels:
      - channelId: ui
        events:
          - negotiation-started
          - own-offer-sent
          - counterparty-offer-received
          - deal-closed
          - escalation
      - channelId: wa-twilio-sandbox
        address:
          phoneE164: "${SELLER_PERSONAL_WHATSAPP_E164}"
        events:
          - negotiation-started
          - own-offer-sent
          - counterparty-offer-received
          - deal-closed
          - escalation
